<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Hero Card</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Georgia', serif;
    }

    .hero-card {
      position: relative;
      width: 320px;
      height: 460px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .hero-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 45px 100px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 200, 100, 0.2);
    }

    .hero-card:hover .card-overlay {
      background: linear-gradient(
        to top,
        rgba(5, 0, 0, 0.98) 0%,
        rgba(5, 0, 0, 0.7) 45%,
        rgba(0, 0, 0, 0.1) 100%
      );
    }

    .card-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(5, 0, 0, 0.95) 0%,
        rgba(5, 0, 0, 0.5) 40%,
        rgba(0, 0, 0, 0.05) 100%
      );
      transition: background 0.3s ease;
    }

    .network-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: Arial, sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #ffffff;
      text-transform: uppercase;
    }

    .network-badge span {
      color: #c9a227;
    }

    .card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 20px 22px;
    }

    .franchise-label {
      font-family: Arial, sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.55);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .movie-title {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.05;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .movie-title .title-highlight {
      color: #e8c86e;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .meta-tag {
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      padding: 3px 8px;
    }

    .meta-tag.rating {
      color: #e8c86e;
      border-color: rgba(232, 200, 110, 0.3);
      background: rgba(232, 200, 110, 0.08);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stream-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stream-label {
      font-family: Arial, sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
    }

    .stream-date {
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.3px;
    }

    .watch-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #c9a227;
      color: #000000;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: Arial, sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .watch-btn:hover {
      background: #e8c86e;
      transform: scale(1.04);
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 8px solid #000;
      flex-shrink: 0;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .hero-card {
        width: 280px;
        height: 400px;
      }

      .movie-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <article class="hero-card">
    <img
      class="card-poster"
      src="https://api.builder.io/api/v1/image/assets/TEMP/d6b708b003ea4735975aa75b2ff87f4b2babd9ee?width=700"
      alt="House of the Dragon movie poster"
    />
    <div class="card-overlay"></div>

    <div class="network-badge">HBO <span>ORIGINAL</span></div>

    <div class="card-content">
      <p class="franchise-label">Game of Thrones</p>
      <h1 class="movie-title">House of the<br /><span class="title-highlight">Dragon</span></h1>

      <div class="card-meta">
        <span class="meta-tag rating">★ 8.5</span>
        <span class="meta-tag">Fantasy</span>
        <span class="meta-tag">Drama</span>
        <span class="meta-tag">TV-MA</span>
      </div>

      <div class="card-footer">
        <div class="stream-info">
          <span class="stream-label">New Series</span>
          <span class="stream-date">Streaming Aug 21</span>
        </div>
        <button class="watch-btn">
          <span class="play-icon"></span>
          Watch Now
        </button>
      </div>
    </div>
  </article>

</body>
</html>
